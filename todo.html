<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="stylesheet" href="todo.css">
</head>
<body>
    <h1>TODO APP</h1>
    <input type="text" placeholder="Enter task" id="task-input">
    <input type="date" placeholder="Enter date" id="date-input">
    <button class="btn" onclick="addTask()">Add</button><br>

    <div id="list"></div>

</body>

<script>
    let todos = JSON.parse(localStorage.getItem("todos")) || [];
    display();
    
    function addTask(){
        let task = document.querySelector("#task-input").value;
        let date = document.querySelector("#date-input").value;

        todos.push({
            taskname: task,
            taskdate: date,

        });

        localStorage.setItem("todo", JSON.stringify(todos));
        display(); 
        console.log(todos);

        document.querySelector("#task-input").value = "";
        document.querySelector("#date-input").value = "";

    }

    function display(){
        let result = "";
        for(let i=0;i<todos.length;i++){
            result += `
            <span>
                ${todos[i].taskname} - ${todos[i].taskdate}
            </span> <br>
            `;
            document.querySelector("#list").innerHTML = result;
        }
    }
    
</script>
</html>
