<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO App</title>
    <link rel="stylesheet" href="todo.css">
</head>
<body>
    <div class="div">
    <h3 class="heading"><i>TODO APP</i> :</h3>
    <div class="div-2">
    <input type="text" placeholder="Enter task" id="task-input">
    <input type="date" placeholder="Enter date" id="date-input"> 
    <button class="btn" onclick="add()">Add</button>   <br>
    </div>
    </div>
    <div id="list">

    </div>
</body>
<script>
    let todos =JSON.parse(localStorage.getItem("todos")) || [];
    display();
    function add() {
        let task = document.querySelector("#task-input").value;
        let date = document.querySelector("#date-input").value;

        if(!task ||!date){
            alert("Please fill the task name and date");
            return;
        }

        todos.push({
            taskname:task,
            taskdate:date,
        });

        localStorage.setItem("todos",JSON.stringify(todos));
        display();

        document.querySelector("#task-input").value ="";
        document.querySelector("#date-input").value ="";
    }


    function display(){
        let result = "";
        for(let i=0;i<todos.length;i++){
            result += `
            <span>
                ${todos[i].taskname} - ${todos[i].taskdate}
                 <button onClick="deleteTask(${i})";> Delete</button>
            </span> <br>  
            `;
        }
          document.querySelector("#list").innerHTML = result;
    }

    function deleteTask (index){
        todos.splice(index,1);
        localStorage.setItem("todo",JSON.stringify(todos));
        display();
    }

</script>
</html>
